---
- name: Deploy Multi-Container Lab
  hosts: webserver
  become: true
  vars:
    project_root: /home/ec2-user/MultiContainerLab
    docker_compose_version: "v2.29.2"
    buildx_version: "v0.17.0"

  tasks:
    - name: Update yum cache
      yum:
        update_cache: yes

    - name: Install Docker and Git
      yum:
        name: 
          - docker
          - git
        state: present

    - name: Start and enable Docker service
      service:
        name: docker
        state: started
        enabled: yes

    - name: Add ec2-user to docker group
      user:
        name: ec2-user
        groups: docker
        append: yes

    - name: Create Docker cli-plugins directory
      file:
        path: /usr/local/lib/docker/cli-plugins
        state: directory
        mode: '0755'

    - name: Install Docker Compose (V2)
      get_url:
        url: "https://github.com/docker/compose/releases/download/{{ docker_compose_version }}/docker-compose-linux-x86_64"
        dest: /usr/local/bin/docker-compose
        mode: '0755'

    - name: Install Docker Buildx Plugin
      get_url:
        url: "https://github.com/docker/buildx/releases/download/{{ buildx_version }}/buildx-{{ buildx_version }}.linux-amd64"
        dest: /usr/local/lib/docker/cli-plugins/docker-buildx
        mode: '0755'

    - name: Refresh SSH connection to apply group changes
      meta: reset_connection

    - name: Create project directory
      file:
        path: "{{ project_root }}"
        state: directory
        owner: ec2-user
        group: ec2-user

    - name: Copy application files to remote
      copy:
        src: ../app/
        dest: "{{ project_root }}/"
        owner: ec2-user
        group: ec2-user

    - name: Run Docker Compose Up
      become_user: ec2-user
      shell:
        cmd: /usr/local/bin/docker-compose up -d --build
        chdir: "{{ project_root }}"