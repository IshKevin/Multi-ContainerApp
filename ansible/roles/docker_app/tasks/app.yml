- name: Create project directory
  file:
    path: "{{ project_root }}"
    state: directory
    owner: ec2-user
    group: ec2-user

- name: Copy application files
  copy:
    src: ../app/
    dest: "{{ project_root }}/"
    owner: ec2-user
    group: ec2-user

- name: Run Docker Compose
  become_user: ec2-user
  shell:
    cmd: /usr/local/bin/docker-compose up -d --build
    chdir: "{{ project_root }}"